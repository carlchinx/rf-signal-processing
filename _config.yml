title: RF Signal Processing - Documentation
description: Documentation and media for the RF Signal Processing project.
baseurl: /rf-signal-processing
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme

exclude:
  - .venv/
  - .github/
  - pipeline/data/
  - pipeline/rf_pipeline/
  - pipeline/synthetic_data/
  - pipeline/__pycache__/
  - pipeline/s2p_tda_rtx4070.py
  - pipeline/visualize_pipeline.py
  - pipeline/config.yaml
  - pipeline/README.md
  - pipeline/requirements.txt
  - pipeline/outputs/s2p_tda_rtx4070/bayes/
  - pipeline/outputs/s2p_tda_rtx4070/metrics/
  - pipeline/outputs/s2p_tda_rtx4070/ml/
  - pipeline/outputs/s2p_tda_rtx4070/ph/
  - pipeline/outputs/s2p_tda_rtx4070/tda/
  - pipeline/outputs/s2p_tda_rtx4070/time_domain/
  - pipeline/outputs/s2p_tda_rtx4070/vector_fit/
  - pipeline/outputs/s2p_tda_rtx4070/*.csv
  - pipeline/outputs/s2p_tda_rtx4070/*.json
  - pyproject.toml
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock

defaults:
  - scope:
      path: "docs/assets/img"
    values:
      image: true
  - scope:
      path: "docs/assets/audio"
    values:
      audio: true
  - scope:
      path: "docs/assets/infographx"
    values:
      image: true
  - scope:
      path: "docs/assets/pptx"
    values:
      presentation: true
  - scope:
      path: "docs/assets/video"
    values:
      video: true