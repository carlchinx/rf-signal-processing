<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <style>
    :root {
      --bg-1: #f2f7fb;
      --bg-2: #dbe7f1;
      --ink: #0e2741;
      --muted: #47627b;
      --brand: #0b6c93;
      --brand-soft: #d7eef7;
      --card: #ffffff;
      --line: #c8d7e6;
      --shadow: 0 14px 30px rgba(14, 39, 65, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 10%, rgba(11, 108, 147, 0.14), transparent 42%),
        radial-gradient(circle at 88% 0%, rgba(8, 53, 94, 0.16), transparent 40%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      font-family: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 2.25rem 1rem 2.75rem;
    }

    .hero {
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.96), rgba(244, 250, 255, 0.94));
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 1.8rem;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -100px;
      top: -120px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(11, 108, 147, 0.17), rgba(11, 108, 147, 0));
      pointer-events: none;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.45rem, 2.2vw, 2.1rem);
      line-height: 1.2;
      letter-spacing: 0.01em;
    }

    p {
      margin: 0.45rem 0;
      color: var(--muted);
      line-height: 1.58;
    }

    .grid {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 0.85rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 8px 18px rgba(14, 39, 65, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(14, 39, 65, 0.12);
    }

    .card h2 {
      margin: 0 0 0.55rem;
      font-size: 1.01rem;
    }

    .tag {
      display: inline-block;
      padding: 0.22rem 0.52rem;
      margin-bottom: 0.55rem;
      border-radius: 999px;
      font-size: 0.78rem;
      color: #0e5270;
      background: var(--brand-soft);
      border: 1px solid #b5dded;
    }

    ul {
      margin: 0;
      padding-left: 1.1rem;
    }

    li {
      margin: 0.36rem 0;
      line-height: 1.4;
    }

    a {
      color: var(--brand);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer-note {
      margin-top: 0.85rem;
      font-size: 0.88rem;
      color: var(--muted);
    }

    code {
      background: #eff5fa;
      border: 1px solid #d8e5f0;
      border-radius: 6px;
      padding: 0.08rem 0.34rem;
    }
  </style>
</head>
<body>
  <main class="container">
    {{ content }}
  </main>
</body>
</html>
